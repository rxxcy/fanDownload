name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            bin: fan_download
            asset: fan-download-linux
          - os: windows-latest
            label: Windows
            bin: fan_download.exe
            asset: fan-download-windows.exe
          - os: macos-latest
            label: macOS
            bin: fan_download
            asset: fan-download-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Rust
        run: rustup show

      - name: Run Tests
        run: cargo test

      - name: Build Release Binary
        run: cargo build --release

      - name: Prepare Release Asset
        shell: pwsh
        run: |
          Copy-Item "target/release/${{ matrix.bin }}" "${{ matrix.asset }}"

      - name: Upload Release Asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten Artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path dist -Recurse -File | ForEach-Object {
            Copy-Item $_.FullName -Destination $_.Name
          }

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create $env:GITHUB_REF_NAME `
            fan-download-linux `
            fan-download-windows.exe `
            fan-download-macos `
            --generate-notes `
            --verify-tag
